schema_version = "1.1"

[task]
name = "johnbuck/adaptive-tool-error-recovery"
description = "ADAPTIVE recovery (reworked 2026-06-10): the dfetch tool fails with DIFFERENT, actionable errors until the agent reads each and applies the SPECIFIC fix — supply --region, then a provisioned region, then a valid session token, then clear a stale lock via `dfetch --release`. The errors name the failing FLAG but not the VALUE: the provisioned regions and the session token are discovered by exploring /app/dfetch.conf, not dictated by stderr, so the loop tests diagnosis rather than stderr-obedience. On success the compiled, stripped dfetch binary mints NONCE = HMAC-SHA256(secret, region|token|counter) with a build-time secret embedded in the binary (no plaintext secret on the filesystem) — there is NO offline / file-read path to the payload, the only route is driving dfetch through the error sequence to a genuine success. The grader authenticates the nonce by calling dfetch's hidden `--verify` subcommand (it never holds the secret) and additionally requires the ordered append-only progression log /var/log/dfetch.progression to show the error ladder ending in `release`; /app/payload.txt and /app/token.txt must match the emitted nonce. A forged STATUS=success with no authentic nonce and no ordered progression scores 0 at ANY call count (VOID, recovered=0). reward = 0.6*correctness + 0.4*efficiency; efficiency is a non-clamped band on the call count (IDEAL 3 = clean conf-first recovery, CEIL 18 = flailing) and is 0 when no verified success occurred. Calls counted from /var/log/dfetch.counter. No telegraphing: instruction states only basic usage + deliverables."
authors = [{name = "johnbuck"}]
keywords = ["ops-debugging", "failure-recovery", "adaptive-recovery", "diagnosis"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "ops-debugging"
shape = "failure-recovery-loop"
tags = ["ops-debugging", "failure-recovery", "harness-discriminating"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
