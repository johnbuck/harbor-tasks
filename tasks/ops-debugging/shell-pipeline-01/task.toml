schema_version = "1.1"

[task]
name = "johnbuck/shell-pipeline-01"
description = "Extract five independent statistics from an Nginx access log via shell pipelines (most-500 IP with a volume tie-break, 5xx counts, distinct-IP count, top 4xx path with query-string stripped, 2xx byte sum with '-' edge case). Graded per sub-result: reward = fraction of the five KEY=value answers exactly correct."
authors = [{name = "johnbuck"}]
keywords = ["ops-debugging", "shell-pipeline", "logs", "bash"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "ops-debugging"
shape = "shell-pipeline"
tags = ["ops-debugging", "shell-pipeline"]

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
