schema_version = "1.1"

[task]
name = "johnbuck/failure-recovery-loop-01"
description = "Tool returns transient errors before succeeding; agent must retry, not give up. Verifier inspects how many tries it took + whether the agent completed."
authors = [{name = "johnbuck"}]
keywords = ["ops-debugging", "failure-recovery", "retry"]

[metadata]
author_name = "johnbuck"
difficulty = "easy"
category = "ops-debugging"
shape = "failure-recovery-loop"
tags = ["ops-debugging", "failure-recovery", "harness-discriminating"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
