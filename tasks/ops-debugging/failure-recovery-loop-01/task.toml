schema_version = "1.1"

[task]
name = "johnbuck/failure-recovery-loop-01"
description = "Tool returns transient errors before succeeding; agent must retry, not give up. Verifier grades EFFICIENCY of recovery, not just eventual success: reward = 0.6*correctness + 0.4*efficiency, where efficiency is clamped on a retry budget (ideal 4 invocations = clean recovery, ceiling 15 = flailing). A harness that recovers in the minimum attempts scores ~1.0; one that burns a dozen retries scores ~0.7; never-recovered scores ~0. Attempts counted from /var/log/fetch.counter, incremented by flaky-fetch on every call."
authors = [{name = "johnbuck"}]
keywords = ["ops-debugging", "failure-recovery", "retry"]

[metadata]
status = "deprecated"
deprecation_date = "2026-06-01"
deprecation_reason = "Deterministic fail-1-3/succeed-4 → fixed retry loop is optimal; no adaptive recovery tested."
deprecation_doc = "backlog/2026-06-01-adversarial-review.md"
author_name = "johnbuck"
difficulty = "hard"
category = "ops-debugging"
shape = "failure-recovery-loop"
tags = ["ops-debugging", "failure-recovery", "harness-discriminating"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
