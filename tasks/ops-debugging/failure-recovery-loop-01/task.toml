schema_version = "1.1"

[task]
name = "johnbuck/failure-recovery-loop-01"
description = "ADAPTIVE recovery (reworked 2026-06-01): the dfetch tool fails with DIFFERENT, actionable errors until the agent reads each and applies the SPECIFIC fix — supply --region, then a provisioned region (eu-west|us-east, revealed only by the error), then the session token at /app/.dfetch_token (revealed by the 401), then clear a stale lock via `dfetch --release`. A blind retry of the same command stalls on the first unmet requirement forever, so CORRECTNESS itself discriminates an observe-diagnose-adapt harness from a flailing one (the old deterministic fail-1-3/succeed-4 version let a fixed retry loop win). reward = 0.6*correctness + 0.4*efficiency; efficiency clamps on a call budget (IDEAL 6 = clean discovery, CEIL 18 = flailing); never-recovered scores 0. Calls counted from /var/log/dfetch.counter. No telegraphing: instruction states only basic usage + deliverables."
authors = [{name = "johnbuck"}]
keywords = ["ops-debugging", "failure-recovery", "adaptive-recovery", "diagnosis"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "ops-debugging"
shape = "failure-recovery-loop"
tags = ["ops-debugging", "failure-recovery", "harness-discriminating"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
