schema_version = "1.1"

[task]
name = "johnbuck/http-outage-root-cause-from-logs"
description = "Diagnose a connection-pool-exhaustion outage from a ~100k-line incident log (reworked 2026-06-01). The deprecated version was 45 lines that NARRATED their own root cause in inline `-- ...` comments and was keyword-graded (copyable) — trivially one-shot. Now: narration is stripped (raw events only; the causal chain must be inferred), the ~30 causal lines are buried in ~100k lines of routine traffic (search-and-synthesize under volume, not read-the-whole-thing), and the grader includes a COMPUTED-VALUE gate — the connection-hold duration (~155s) is printed nowhere and must be derived by subtracting timestamps (conn#1 acquired 08:05:00, first 500 at 08:07:34), which a keyword dump cannot produce. Deterministic /10: proximate timeout, pool exhaustion, the report-job hog, undersized pool config, the computed hold, 3 evidence cites, a not-fooled-by-disk red-herring check, and an actionable fix."
authors = [{name = "johnbuck"}]
keywords = ["ops-debugging", "diagnose-from-logs", "root-cause", "long-log", "synthesis"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "ops-debugging"
shape = "diagnose-from-logs"
tags = ["ops-debugging", "diagnose-from-logs", "long-context", "harness-discriminating"]

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
