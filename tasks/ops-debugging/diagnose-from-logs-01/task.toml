schema_version = "1.1"

[task]
name = "johnbuck/diagnose-from-logs-01"
description = "Read a noisy incident log with multiple contributing causes plus a red herring, write a diagnosis (root cause(s), evidence, red-herring call-out, fix). Graded deterministically: reward = fraction of the required root-cause + evidence findings identified, with a penalty for blaming the red herring."
authors = [{name = "johnbuck"}]
keywords = ["ops-debugging", "diagnose-from-logs", "root-cause", "evidence"]

[metadata]
status = "deprecated"
deprecation_date = "2026-06-01"
deprecation_reason = "Log narrates its own root cause in inline comments; keyword-match grader; one-shot model reading."
deprecation_doc = "backlog/2026-06-01-adversarial-review.md"
author_name = "johnbuck"
difficulty = "hard"
category = "ops-debugging"
shape = "diagnose-from-logs"
tags = ["ops-debugging", "diagnose-from-logs"]

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
