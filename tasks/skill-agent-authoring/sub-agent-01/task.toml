schema_version = "1.1"

[task]
name = "johnbuck/sub-agent-01"
description = "Author 16 distinct specialist Claude Code subagent definition files. Each is independent work — harnesses with strong sub-agent/delegation support author more correctly. Adversarial wrinkles (collidable roles, full-word triggers vs near-synonyms, body must echo its own name) make a sloppy decomposition drop criteria. Verifier is deterministic and GRADED: reward = passed_subchecks / 64 (4 structural sub-checks per file)."
authors = [{name = "johnbuck"}]
keywords = ["skill-agent-authoring", "sub-agent", "parallel", "delegation"]

[metadata]
status = "deprecated"
deprecation_date = "2026-06-01"
deprecation_reason = "Rote 16-file emit from a fully-specified table; fan-out never required or measured."
deprecation_doc = "backlog/2026-06-01-adversarial-review.md"
author_name = "johnbuck"
difficulty = "hard"
category = "skill-agent-authoring"
shape = "sub-agent"
tags = ["skill-agent-authoring", "sub-agent", "harness-discriminating", "graded"]

[verifier]
timeout_sec = 120.0

[agent]
# Tight on purpose: 10 independent subagent files. A serial author is slow;
# harnesses that fan the authoring out across sub-agents finish more under budget.
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
