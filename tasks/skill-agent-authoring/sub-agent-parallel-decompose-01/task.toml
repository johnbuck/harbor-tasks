schema_version = "1.1"

[task]
name = "johnbuck/sub-agent-parallel-decompose-01"
description = "REDESIGNED 2026-06-01. 60 independent PROSE word-problems, each needing genuine multi-step reasoning (track a running quantity through 5 sequential ops incl. a value-dependent branch) with a single deterministic integer answer — NOT solvable by a script. There are enough that solving all 60 SERIALLY in one token-stream blows the 10-minute budget, while fanning out to sub-agents (openclaw sessions_spawn / hermes delegate_task) finishes far more in time. reward = correct/60, a NON-CLAMPED base that the fan-out advantage raises directly (no inert 'bonus'). Concurrency reported as a diagnostic from OUTPUT-FILE mtimes (wall-clock), not agent-self-reported timestamps. Leak-proof: only the prose is in /app; the answer key lives in tests/ + solution/ (never the agent container). NOTE: the discrimination depends on 60-vs-budget being above the serial/parallel threshold for the model under test — N and the agent timeout are the calibration knobs; if a first real run shows both harnesses finishing serially (base=1.0 both), raise N."
authors = [{name = "johnbuck"}]
keywords = ["skill-agent-authoring", "sub-agent", "delegation", "parallel", "graded"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "skill-agent-authoring"
shape = "sub-agent-parallel-decompose"
tags = ["skill-agent-authoring", "sub-agent", "delegation", "harness-discriminating"]

[verifier]
timeout_sec = 60.0

[agent]
# Deliberately tight: 60 multi-step reasoning problems solved one-at-a-time in a
# single serial token-stream exceed this wall-clock; a harness that fans out to
# sub-agents (independent token-streams) finishes far more. This 10-minute bound
# vs. the problem count IS the calibration knob — see task description.
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
