schema_version = "1.1"

# Separate verifier sandbox (P3): grading runs in its own container that sees
# ONLY these artifacts copied from the agent sandbox — not full /app, not the
# tests/ grader code, not running processes. The agent therefore cannot read the
# grader logic or plant state to game it. /app/data is copied so the verifier can
# RECOMPUTE expected (no answer key anywhere); /app/out + /app/.skill-runs are the
# agent's product + the correct-skill breadcrumb.
artifacts = ["/app/data", "/app/out", "/app/.skill-runs"]

[task]
name = "johnbuck/skill-discovery-and-use-01"
description = "The ONE correct skill (tabular-shape-report — a name that does NOT echo the prompt) is buried among 12 decoys, THREE of which (csv-summary, csv-structure, table-summary) have more on-topic names and emit a near-miss (right keys, wrong null/dtype/row semantics). The output contract and a load-bearing required flag (--null=empty) live ONLY in the correct skill's SKILL.md, so name-only guessing picks a wrong skill and skipping the doc yields wrong output. Verifier is GRADED: reward = passed_subchecks / 16 (per file: output-correct + correct-skill-actually-read-this-file via a content-hashed breadcrumb the verifier re-derives)."
authors = [{name = "johnbuck"}]
keywords = ["skill-agent-authoring", "skill-discovery", "decoys", "graded"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "skill-agent-authoring"
shape = "skill-discovery-and-use"
tags = ["skill-agent-authoring", "skill-discovery", "harness-discriminating", "graded"]
# Discrimination: the correct skill's name does not echo the prompt and the
# output contract + required --null=empty flag are documented ONLY in its
# SKILL.md, so discovery requires reading descriptions (3 colliding decoys with
# more on-topic names emit near-miss output) and correct use requires reading the
# doc body (the default flag mode is subtly wrong). The breadcrumb logs a per-file
# content hash the verifier re-derives, so a from-scratch reimplementation can't
# fake discovery by echoing filenames. Graded across 8 files x 2 sub-checks so
# partial discovery/use earns a fractional, gradient reward.

[verifier]
timeout_sec = 60.0
environment_mode = "separate"

# Verifier runs in its own sandbox, BUILT FROM tests/Dockerfile (which bakes the
# grader AND rewardkit into the image). Do NOT pin docker_image here — that
# suppresses the tests/Dockerfile build and ships an image with no /tests/test.sh.
# rewardkit is baked, so grading needs no network: allow_internet = false.
[verifier.environment]
allow_internet = false

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
