schema_version = "1.1"

[task]
name = "johnbuck/pandas-sql-from-nl-01"
description = "Answer six pandas analysis questions over a messy sales CSV (filtered sums, distinct counts, groupby-mean/sum argmax, a join to a products CSV) where exact-duplicate rows and null amounts must be handled per the stated rules. Graded per question: reward = fraction of the six KEY=value answers correct."
authors = [{name = "johnbuck"}]
keywords = ["data-analytics", "pandas", "csv", "python"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "data-analytics"
shape = "pandas-sql-from-nl"
tags = ["data-analytics", "pandas-sql-from-nl"]

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

