schema_version = "1.1"

[task]
name = "johnbuck/restore-runbook-01"
description = "Write a database restore runbook from a pg_dump-to-S3 backup setup description; graded by an LLM judge."
authors = [{name = "johnbuck"}]
keywords = ["backup-dr", "restore-runbook", "llm-as-a-judge"]

[metadata]
author_name = "johnbuck"
difficulty = "medium"
category = "backup-dr"
shape = "restore-runbook"
tags = ["backup-dr", "restore-runbook", "judge"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
MODEL_NAME = "claude-opus-4-7"

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
