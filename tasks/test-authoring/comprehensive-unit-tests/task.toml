schema_version = "1.1"

[task]
name = "johnbuck/comprehensive-unit-tests"
description = "Write pytest tests for slugify() graded deterministically by MUTATION coverage: must pass the correct impl and kill 4 independent behavior mutants (lowercase, collapse-runs, strip-hyphens, preserve-digits); reward = killed/4. A suite that passes the correct impl but catches no mutant scores 0."
authors = [{name = "johnbuck"}]
keywords = ["test-authoring", "unit-tests", "pytest", "mutation", "graded"]

[metadata]
author_name = "johnbuck"
difficulty = "medium"
category = "test-authoring"
shape = "unit-tests"
tags = ["test-authoring", "unit-tests", "mutation", "graded", "deterministic"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
