schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/true-multi-turn-memory-write-01"
description = "Seven conversation turns share EIGHT personal facts — two of which are CORRECTED in a later turn (timezone Pacific->Mountain; climbing nights Tue/Thu/Sat->Mon/Wed/Fri). The eighth turn asks for a structured recap of all eight fields (using the LATEST values) plus a constraint-satisfying dinner. Tests whether the harness PROACTIVELY writes/UPDATES memory without being told and retrieves the current values back. Deterministically graded on the fraction of the eight fields reproduced with the latest value (stale/omitted = no credit), so partial or un-updated memory surfaces as a fraction."
authors = [{name = "johnbuck"}]
keywords = ["conversation-persona", "true-multi-turn", "memory-write", "memory-retrieval"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "conversation-persona"
shape = "true-multi-turn-memory-write"
tags = ["conversation-persona", "true-multi-turn", "memory-proactivity", "harness-discriminating"]

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true   # needs to reach recall/hindsight on <memory-host> LAN
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-share-diet"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "02-share-pet"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "03-share-timezone"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "04-share-allergy"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "05-share-hobby"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "06-share-more"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "07-corrections"
