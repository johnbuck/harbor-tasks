schema_version = "1.1"

[task]
name = "johnbuck/remember-facts-01"
description = "Recall specific facts from an embedded prior-conversation transcript and write them to a file; graded by an LLM judge."
authors = [{name = "johnbuck"}]
keywords = ["conversation-persona", "remember-facts", "llm-as-a-judge"]

[metadata]
author_name = "johnbuck"
difficulty = "easy"
category = "conversation-persona"
shape = "remember-facts"
# single-turn-proxy: the multi-turn conversation is embedded in the instruction
# as a transcript rather than executed as live turns. True multi-turn deferred.
tags = ["conversation-persona", "remember-facts", "judge", "single-turn-proxy"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
MODEL_NAME = "claude-opus-4-7"

[environment.env]

[solution.env]
