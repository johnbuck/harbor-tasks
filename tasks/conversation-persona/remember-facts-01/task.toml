schema_version = "1.1"

[task]
name = "johnbuck/remember-facts-01"
description = "Recall specific facts from an embedded prior-conversation transcript and write them to a file; graded by an LLM judge."
authors = [{name = "johnbuck"}]
keywords = ["conversation-persona", "remember-facts", "llm-as-a-judge"]

[metadata]
status = "deprecated"
deprecation_date = "2026-06-01"
deprecation_reason = "Already model-only: transcript pasted in one prompt; memory path never exercised; 3 facts, no distance."
deprecation_doc = "backlog/2026-06-01-adversarial-review.md"
author_name = "johnbuck"
difficulty = "easy"
category = "conversation-persona"
shape = "remember-facts"
# model-only: the multi-turn conversation is embedded in the instruction as a
# transcript rather than executed as live turns, so the harness's memory write
# path is never exercised. Kept in Track B for general-capability reporting.
# Track A coverage of the same gap comes from the
# `true-multi-turn-memory-write` shape (Harbor steps/ task).
tags = ["conversation-persona", "remember-facts", "judge", "model-only"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
MODEL_NAME = "claude-opus-4-7"

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
