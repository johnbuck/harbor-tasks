schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/apply-standing-preferences-unprompted"
description = "Proactive preference application: the operator states 4 standing formatting preferences (ISO dates, 24h time, no-emoji headings, sign with initials D.H.) in an early turn, memorize-only. After distractor turns, a final task asks for a meeting announcement and deliberately phrases the date+time in the NON-preferred form ('March 5th, 2026 at 3:00 PM') WITHOUT restating the preferences. Cheat-proof: a setup.sh wipes any notes before the trigger, so the preferences must come from the harness's own memory backend. Graded /4 on how many standing preferences the harness applied UNPROMPTED — tests proactive ambient-memory application, not recall-on-demand."
authors = [{name = "johnbuck"}]
keywords = ["conversation-persona", "memory", "proactive-preference", "multi-step"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "conversation-persona"
shape = "multistep-proactive-preference"
tags = ["conversation-persona", "multi-step", "memory", "proactive-preference", "harness-discriminating"]

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-set-prefs"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "02-distractor"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "03-distractor"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "04-announce"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0
