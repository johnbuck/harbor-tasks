schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-memory-conversational-01"
description = "Multi-turn memory under PRECISION pressure: 14 of my personal facts planted across 2 early steps, then 4 distractor turns that each plant a confusable fact about someone ELSE (a coworker's shellfish allergy & cat, a friend's Honda & Dune, a neighbor's Mar-4 birthday & Portland, a marine GEOlogist brother-in-law), then graded recall of 12 of MY facts with NO notes/files — one fact (the car) requires make+model+colour/year, so detail matters. A harness that confuses others' facts for mine, or recalls vaguely, scores a fraction (scored with a per-fact SIBLING PENALTY — stating the planted distractor value, or hedging by dumping both, forfeits that fact (precise recall=1.0, hedge/confuse on every sibling-fact ≈ 0.33)). Stresses session-memory precision + detail retention, not just gross recall."
authors = [{name = "johnbuck"}]
keywords = ["conversation-persona", "remember-facts", "multi-step", "memory"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "conversation-persona"
shape = "multistep-memory-conversational"
tags = ["conversation-persona", "multi-step", "memory-conversational", "harness-discriminating"]


[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

