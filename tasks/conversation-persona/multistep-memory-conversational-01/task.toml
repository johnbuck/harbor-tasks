schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-memory-conversational-01"
description = "Multi-turn memory under load: 8 personal facts planted across 2 early steps, then 4 substantive distractor turns, then graded recall of 6 facts with NO notes/files allowed — stresses the harness's session-memory write+retrieve path across distance. Graded (fraction recalled) so retrieval reliability separates harnesses."
authors = [{name = "johnbuck"}]
keywords = ["conversation-persona", "remember-facts", "multi-step", "memory"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "conversation-persona"
shape = "multistep-memory-conversational"
tags = ["conversation-persona", "multi-step", "memory-conversational", "harness-discriminating"]


[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-intro-a"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "02-intro-b"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "03-distractor"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "04-distractor"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "05-distractor"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "06-distractor"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "07-recall"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0
