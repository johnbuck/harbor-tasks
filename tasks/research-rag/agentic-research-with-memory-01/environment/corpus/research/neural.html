<h1>Neural systems</h1>
<p>The neural systems group, led by Dr. Ravi Iyengar, focuses on biologically-plausible spiking network models. The work is conducted in partnership with the UCSF Department of Neurology.</p>
<p>We run training on a small in-house cluster of 12 NVIDIA H100 GPUs.</p>
