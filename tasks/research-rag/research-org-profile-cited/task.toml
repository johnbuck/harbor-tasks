schema_version = "1.1"

[task]
name = "johnbuck/research-org-profile-cited"
description = "Agentic research over a sandboxed seeded corpus of ~16 interlinked pages about a fictional research lab. The agent must gather EIGHT facts — two of which require cross-document synthesis (summing two 2025 NSF awards while excluding a DOE award and a prior-year grant) — and cite each to its AUTHORITATIVE source. A planted press page and a draft-tracker page carry plausible-but-wrong figures (founding year, HQ, climate lead, NSF total, headcount, GPU count, publication count); citing a distractor or parroting its value earns no credit. Deterministically graded on the fraction of the 8 facts stated correctly AND cited to the right page."
authors = [{name = "johnbuck"}]
keywords = ["research-rag", "agentic-research", "synthesis", "citations"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "research-rag"
shape = "agentic-research-with-memory"
tags = ["research-rag", "agentic-research", "multi-source", "harness-discriminating"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 900.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
