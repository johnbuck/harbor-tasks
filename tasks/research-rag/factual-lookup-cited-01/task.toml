schema_version = "1.1"

[task]
name = "johnbuck/factual-lookup-cited-01"
description = "Answer ten factual questions about a fictional company knowledge base (Halcyon Systems, served locally), each requiring the CURRENT/correct value AND a citation to the AUTHORITATIVE page. The corpus seeds an archived/legacy near-duplicate for every fact (old press profile, prior fiscal year, deprecated v1 API page, etc.) stating a superseded value; citing the archive — or parroting its value — earns no credit. Deterministically graded on the fraction of items where value and authoritative citation are both correct."
authors = [{name = "johnbuck"}]
keywords = ["research-rag", "factual-lookup-cited", "llm-as-a-judge"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "research-rag"
shape = "factual-lookup-cited"
tags = ["research-rag", "factual-lookup-cited", "multi-source", "graded", "harness-discriminating"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
