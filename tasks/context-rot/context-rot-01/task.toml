schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/context-rot-01"
description = 'Context-ROT test (MERIDIAN HALL conservation survey) — the in-window sibling of the context-fill OVERFLOW family. 18 inspection records, ~19K tokens each / ~345K cumulative = ~0.34x the deepseek-v4-pro 1M window, so it sits in the empirical ~300-400K rot zone but does NOT overflow (the harness is never FORCED to compact). It tests whether the harness PROACTIVELY manages context to beat lost-in-the-middle rot. 12 single-statement needles are planted at controlled conversational depth — EARLY (visits 2-6), MIDDLE (visits 8-12, rot-critical), LATE (visits 14-18) — and each recall question PARAPHRASES its needle (orangery->conservatory, balustrade->railing, clock tower->bell tower) so it cannot be keyword-grepped (NoLiMa-style associative recall). Records are DELETED before recall; answers are line-anchored /12; the early/middle/late subscores expose the rot curve (middle<<edges = rot; flat = mitigated). No instruction mentions burial, position, or rot. Oracle=1.0.'
authors = [{name = "johnbuck"}]
keywords = ["context-management", "context-rot", "long-context", "multi-step", "lost-in-the-middle"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "context-rot"
shape = "context-rot"
tags = ["context-rot", "context-management", "multi-step", "long-context", "lost-in-the-middle", "harness-discriminating"]


[environment]
build_timeout_sec = 900.0
workdir = "/app"
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

