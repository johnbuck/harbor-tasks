schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/context-rot-02"
description = 'Context-ROT, MULTI-HOP variant (WESTMARCH PRIORY) — rung 2 of the context-rot family. Same in-window regime as rot-01 (18 records, ~19K tok each / ~357K cumulative = ~0.34x the deepseek-v4-pro 1M window; deep in the ~300-400K rot zone but NO overflow). Each of 8 recall questions requires CHAINING TWO facts buried at different conversational depths via a bridge entity (anchor: feature->bridge; bridge: bridge->attribute), so rot on EITHER hop breaks the chain (RULER variable-tracking). Chains are bucketed by depth: EARLY (both hops visits 2-6, primacy-protected), MIDDLE (both hops visits 8-12, lost-in-the-middle, rot-critical), LATE (both hops visits 14-18, recency-protected). Questions paraphrase the bridge link (NoLiMa); records wiped before recall; line-anchored /8 scorer with early/middle/late subscores that read the rot curve (middle<<edges = rot). No telegraphing of burial, hops, or rot. Oracle=1.0.'
authors = [{name = "johnbuck"}]
keywords = ["context-management", "context-rot", "long-context", "multi-step", "multi-hop", "lost-in-the-middle"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "context-rot"
shape = "context-rot"
tags = ["context-rot", "context-management", "multi-step", "long-context", "multi-hop", "lost-in-the-middle", "harness-discriminating"]


[environment]
build_timeout_sec = 900.0
workdir = "/app"
cpus = 2
memory_mb = 4096
