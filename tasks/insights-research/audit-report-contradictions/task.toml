schema_version = "1.1"

[task]
name = "johnbuck/audit-report-contradictions"
description = "Read a four-section annual operating review with TWELVE planted internal contradictions (several subtle, spanning sections that appear pages apart) plus FOUR near-miss distractors that are NOT contradictions (current-vs-future target, explicitly-superseded forecast, subtotal-vs-total, and different fiscal years). Deterministically graded as precision+recall: reward = (genuine found − distractors wrongly flagged) / 12, so an over-flagging harness loses points."
authors = [{name = "johnbuck"}]
keywords = ["insights-research", "find-contradictions", "llm-as-a-judge"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "insights-research"
shape = "find-contradictions"
tags = ["insights-research", "find-contradictions", "multi-source", "graded", "harness-discriminating"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
