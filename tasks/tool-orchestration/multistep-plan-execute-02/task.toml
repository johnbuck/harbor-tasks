schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-plan-execute-02"
description = "Plan → implement → test a word-frequency CLI tool with punctuation stripping, deterministic alphabetical tie-break, stopwords, min-length, and --top N (wordfreq.py). GRADED final step: 12 independent sub-checks. Difficulty wrinkles: the naive split()+Counter.most_common approach skips punctuation normalization, gives nondeterministic tie-breaks, and ignores --stopwords/--min-len/--top."
authors = [{name = "johnbuck"}]
keywords = ["tool-orchestration", "multi-step", "plan-execute", "word-frequency", "cli"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "tool-orchestration"
shape = "multistep-plan-execute"
tags = ["tool-orchestration", "multi-step", "plan-execute", "harness-discriminating"]


[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 180.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-plan"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0

[[steps]]
name = "02-implement"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0

[[steps]]
name = "03-test"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0
