schema_version = "1.1"
multi_step_reward_strategy = "mean"

[task]
name = "johnbuck/multistep-plan-execute-02"
description = "Plan → implement → test a word-frequency CLI tool: wordfreq.py reads a text file and prints the single most-common whitespace-delimited word (lowercased)."
authors = [{name = "johnbuck"}]
keywords = ["tool-orchestration", "multi-step", "plan-execute", "word-frequency", "cli"]

[metadata]
author_name = "johnbuck"
difficulty = "medium"
category = "tool-orchestration"
shape = "multistep-plan-execute"
tags = ["tool-orchestration", "multi-step", "plan-execute"]


[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 180.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-plan"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0

[[steps]]
name = "02-implement"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0

[[steps]]
name = "03-test"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0
