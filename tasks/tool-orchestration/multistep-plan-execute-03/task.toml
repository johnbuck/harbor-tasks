schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-plan-execute-03"
description = "Plan → implement → test a multi-mode temperature converter CLI (tempconv.py: c2f/f2c/c2k/k2c). GRADED final step: 12 independent sub-checks across conversion correctness, 2-decimal rounding, absolute-zero validation (exit 2 + stderr), bad-mode handling, and a real pytest suite. Difficulty wrinkles: the obvious single-formula approach misses 3 modes, the absolute-zero guard, and the exit-code contract."
authors = [{name = "johnbuck"}]
keywords = ["tool-orchestration", "multi-step", "plan-execute", "temperature", "cli"]

[metadata]
status = "deprecated"
deprecation_date = "2026-06-01"
deprecation_reason = "Tiny temp-converter CLI; pure model coding; saturates 1.0."
