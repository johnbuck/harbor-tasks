schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/plan-then-revise-01"
description = "Agent declares a 4-step plan, executes 2 steps, environment then changes the requirements out from under it. Reworked 2026-06-01 to add real revise friction + a harness-memory discriminator: step 1 fixes a project-wide CLAMP policy ([-1000,1000], applied via a shared _clamp helper); the revision adds `subtract` 'following the same policy as the existing ops' WITHOUT restating the clamp value (it lives only in step 1's conversation). Final step graded on 9 independent sub-checks (5 functional + OP_NAMES + scrapped-plan cleanup + PLAN.md re-plan + the MEMORY check: subtract must clamp). A harness that re-derives the module from REVISION.md alone ships an un-clamped subtract and loses the memory point while still passing the plain subtract check; one that retained the early decision scores it."
authors = [{name = "johnbuck"}]
keywords = ["tool-orchestration", "plan-then-revise", "replan"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "tool-orchestration"
shape = "plan-then-revise"
tags = ["tool-orchestration", "plan-revise", "multi-step", "harness-discriminating"]

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-plan-and-implement-add"
[steps.agent]
timeout_sec = 300.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "02-implement-multiply"
[steps.agent]
timeout_sec = 300.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "03-revise-and-fix"
[steps.agent]
timeout_sec = 300.0
[steps.verifier]
timeout_sec = 30.0
