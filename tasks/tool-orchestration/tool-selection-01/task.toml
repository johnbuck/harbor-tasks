schema_version = "1.1"

[task]
name = "johnbuck/tool-selection-01"
description = "Choose the right tool for a live-data retrieval task; graded by an LLM judge."
authors = [{name = "johnbuck"}]
keywords = ["tool-orchestration", "tool-selection", "llm-as-a-judge"]

[metadata]
author_name = "johnbuck"
difficulty = "easy"
category = "tool-orchestration"
shape = "tool-selection"
tags = ["tool-orchestration", "tool-selection", "judge"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
MODEL_NAME = "claude-opus-4-7"

[environment.env]

[solution.env]
