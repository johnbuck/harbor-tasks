schema_version = "1.1"

[task]
name = "johnbuck/browser-find-fact-01"
description = "Drive the harness's BROWSER tool (both openclaw and hermes are wired to a shared headless Chromium via CDP) to find a fact on a real, stable website. Target: https://quotes.toscrape.com/js/ — a JS-RENDERED page, so a plain `curl`/`wget` of the URL returns no rendered quotes; the harness must actually render + paginate. The asked quote ('Beauty is in the eye of the beholder ... give a stupid or misinformed beholder a black eye') is attributed BY THIS SITE to Jim Henson — an idiosyncratic attribution that differs from the common real-world one, so the model cannot answer from training; it MUST read the site. The quote lives on page 3, so the harness has to navigate/paginate. reward is GATED on actually driving the browser tool AND naming the site's attribution: reward=1 iff (answer-correct, format-robust + sibling penalty) AND (the trajectory shows a browser tool call — matched for BOTH openclaw's single `browser` tool and hermes's `browser_navigate`). This defeats the memorization shortcut (quotes.toscrape data is widely memorized): an answer produced without the browser scores 0. ORACLE CAVEAT: the oracle isn't a browser, so it gets answer_correct=1 but browser_used=0 -> headline 0 (a browser-required task can't be oracle-proven end-to-end; the oracle validates the answer-checking sub-field, a real n=1 proves the browser path). This is the only task that routes through the harness's browser tool layer — PATH-CLI tool tasks can't discriminate it. CAVEAT: depends on an external site (quotes.toscrape.com, a Zyte-maintained stable scraping sandbox) being reachable through the memory host's ProtonVPN exit; a real n=1 is the end-to-end reachability proof (the oracle only validates the grader)."
authors = [{name = "johnbuck"}]
keywords = ["tool-orchestration", "browser", "web-navigation", "harness-discriminating"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "tool-orchestration"
shape = "browser-find-fact"
tags = ["tool-orchestration", "browser", "web-navigation", "harness-discriminating"]

[verifier]
timeout_sec = 60.0

[agent]
# Browser navigation + JS render + pagination across pages takes real wall-clock.
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true   # the harness reaches the CDP browser (<memory-host>:9222) which fetches the site
mcp_servers = []        # uses the harness's BAKED browser tool, not an injected MCP server

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
