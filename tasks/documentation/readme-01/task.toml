authors = [{name = "johnbuck"}]
keywords = ["documentation", "readme", "graded"]

[metadata]
author_name = "johnbuck"
difficulty = "medium"
category = "documentation"
shape = "readme"
tags = ["documentation", "readme", "graded", "deterministic"]

[verifier]
timeout_sec = 300.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
