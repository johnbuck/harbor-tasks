schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/separate-two-parallel-projects"
description = 'Context-window SATURATION test, ladder rung 3 = CROSS-TALK PRECISION (parallel PROJECTS ORION + LYRA). 18 weekly portfolio reports, ~72K tokens each / ~1.3M cumulative = ~1.25x the deepseek-v4-pro 1M window, so it overflows before recall. Each report covers BOTH projects, which share the same attribute set (lead, budget, site, vendor, headcount, go-live) with different, confusable values, re-stated across the quarter so both stay in-window. Failure mode: cross-attribution (reporting the Lyra lead value in the Orion slot, and vice versa) provoked by heavy interleaving under a full window. Reports+notes DELETED before recall. Line-anchored scoring /12: +1 correct value on the slot line, -1 if the sibling project value appears there; one DRAFT Project-Nova decoy must not appear. Oracle=1.0, fully-swapped=0.0.'
authors = [{name = "johnbuck"}]
keywords = ["context-management", "long-context", "multi-step", "memory"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "context-management"
shape = "multistep-context-fill"
tags = ["context-management", "multi-step", "long-context", "context-fill", "harness-discriminating"]


[environment]
build_timeout_sec = 900.0
workdir = "/app"
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

