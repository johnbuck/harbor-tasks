schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-context-fill-01"
description = 'Long-session context management: ~340K tokens of documents across 18 ingest steps, recall facts planted in the first document. Notes file + all docs are DELETED before recall, so markers must come from the harness memory backend (not a re-read). Graded recall of 18 markers + 3 needle facts, with an UPDATE-TRAP (the launch window is corrected 2027-Q3 -> 2027-Q4 in a later doc; only the latest value scores) and 2 DRAFT decoy markers that cost a point if listed = retrieval reliability + update-tracking under heavy context load.'
authors = [{name = "johnbuck"}]
keywords = ["context-management", "long-context", "multi-step", "memory"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "context-management"
shape = "multistep-context-fill"
tags = ["context-management", "multi-step", "long-context", "context-fill", "harness-discriminating"]


[environment]
build_timeout_sec = 900.0
workdir = "/app"
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 600.0

[verifier]
timeout_sec = 60.0

