schema_version = "1.1"

[task]
name = "johnbuck/multistep-context-fill-01"
description = "Long-session context management: ~210K tokens of documents across 11 ingest steps, recall a fact planted in the first document. Tests durable memory under a filled context window."
authors = [{name = "johnbuck"}]
keywords = ["context-management", "long-context", "multi-step", "memory"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "context-management"
shape = "multistep-context-fill"
tags = ["context-management", "multi-step", "long-context", "context-fill"]

multi_step_reward_strategy = "final"

[environment]
build_timeout_sec = 900.0
workdir = "/app"
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

