schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-context-fill-02"
description = 'Context-window SATURATION test, ladder rung 2 = UPDATE-CHURN (PROJECT VEGA datacenter migration). 18 weekly reports, ~72K tokens each / ~1.3M cumulative = ~1.25x the deepseek-v4-pro 1M window, so it overflows before recall. Meaningful evolving prose. Stressor: nearly every one of 12 tracked facts is CORRECTED two or three times across the quarter (lead Reyes->Tanaka->Okafor; target 08-01->09-15->10-30; nodes 48->64->32; region us-east-1->us-west-2->eu-central-1; db PG14->PG16->Aurora; cutover big-bang->phased->blue-green; etc). The analyst must report the FINAL value of record, never an intermediate one. Reports+notes DELETED before recall. Graded /12: +1 per final value, -1 per stale (up to TWO per fact), -1 for the DRAFT GCP decoy. Isolates stale-value surfacing under a full window. Oracle=1.0, intermediate-value=low, first-value=0.0.'
authors = [{name = "johnbuck"}]
keywords = ["context-management", "long-context", "multi-step", "memory"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "context-management"
shape = "multistep-context-fill"
tags = ["context-management", "multi-step", "long-context", "context-fill", "harness-discriminating"]


[environment]
build_timeout_sec = 900.0
workdir = "/app"
cpus = 2
memory_mb = 4096
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

