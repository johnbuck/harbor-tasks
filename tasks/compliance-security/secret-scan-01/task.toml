schema_version = "1.1"

[task]
name = "johnbuck/secret-scan-01"
description = "Scan a repo for hardcoded secrets (API key, AWS key pair, JWT, RSA private key, DB connection string) across 4 files while NOT flagging a placeholder-only decoy; graded on precision+recall (found - false_positive)/4."
authors = [{name = "johnbuck"}]
keywords = ["compliance-security", "secret-scan", "python"]

[metadata]
author_name = "johnbuck"
difficulty = "medium"
category = "compliance-security"
shape = "secret-scan"
tags = ["compliance-security", "secret-scan"]

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
