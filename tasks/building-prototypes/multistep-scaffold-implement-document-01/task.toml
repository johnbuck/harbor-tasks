schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-scaffold-implement-document-01"
description = "Three-step build: scaffold a four-function `calc` arithmetic package (add/sub/mul/divide), implement it (divide returns a float and raises ZeroDivisionError on a zero divisor), then write a README that MATCHES the implementation. GRADED final step: 12 independent sub-checks — files present, agent pytest suite (>=5 tests) passing, add/sub/mul correct, divide float, divide-by-zero raise, no debug cruft, README documents all four functions + the float/ZeroDivisionError contract, and a runnable usage example whose inline '# expected' comments must equal the code's real stdout. Difficulty/doc-matching wrinkle: the naive single-add scaffold and an under-documented README each lose points; the README is graded against what was actually built."
authors = [{name = "johnbuck"}]
keywords = ["building-prototypes", "scaffold", "python", "multi-step"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "building-prototypes"
shape = "multistep-scaffold-implement-document"
tags = ["building-prototypes", "multi-step", "harness-discriminating"]


[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-scaffold"
min_reward = 1.0
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "02-implement"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "03-document"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0
