schema_version = "1.1"

[task]
name = "johnbuck/update-record-with-cleanup-01"
description = "User asks 'remove this month's grocery duplicates and split rent with the new roommate' on a ~55-row multi-month budget ledger (reworked 2026-06-01). The deprecated version SHIPPED THE ANSWER KEY to the agent at world-readable /app/.budget.expected.csv (trivially gameable) and was a small one-shot. Now the expected result is NEVER materialized in the container — the grader computes it from the rules at grade time (tests/grade.py reads a pristine copy of the INPUT, not the answer). The ledger has 5 May-grocery duplicate groups (incl. a triple) plus preservation traps (cross-month grocery dups, a May utilities triple, near-amount pairs, same-date-different-category, same-vendor-different-date) — careful multi-row work, not eyeballable. Per-DECISION partial credit: neither 'do nothing' (~0.46) nor 'over-dedup everything' (~0.62) scores well; only correct dedup + preservation + rent split reaches 1.0."
authors = [{name = "johnbuck"}]
keywords = ["real-world-workflows", "record-update", "data-cleanup", "multi-row-precision"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "real-world-workflows"
shape = "update-record-with-cleanup"
tags = ["real-world-workflows", "data-cleanup", "harness-discriminating", "multi-axis"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
