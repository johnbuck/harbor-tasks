schema_version = "1.1"

[task]
name = "johnbuck/update-record-with-cleanup-01"
description = "User asks, in plain goal terms only, to 'clean up this month's duplicate grocery entries and split this month's rent 50/50 with my new roommate Sam' on a ~340-row, 24-month budget ledger (reworked 2026-06-10: de-telegraphed + scaled to a stateful workflow). instruction.md no longer enumerates the traps or the literal values — the agent must DISCOVER from the data what a duplicate is (identical date+vendor+amount+category) and that earlier-month grocery dups, the May utilities triple, near-amount pairs (55.00 vs 55.10), same-date/different-category (groceries vs household), and same-vendor/different-date rows must NOT be touched. The month ('this month' = May 2026) is handed over in instruction.md, not discovered. The answer key is NEVER materialized in the container — the grader (tests/grade.py) reads a pristine copy of the INPUT (tests/original.csv) and derives the expected result from the rules at grade time. The ledger has 6 May-grocery duplicate groups (incl. a triple) and 7 preserve groups, embedded among ~310 singletons. Per-DECISION partial credit with format tolerance (900.0==900.00; rent halves match on payer not notes; name case-insensitive): neither doing nothing (preserve + collateral credit is gated on real dedup, so it falls below the 0.50 floor) nor over-deduping everything scores well; only correct dedup + preservation + rent split reaches 1.0."
authors = [{name = "johnbuck"}]
keywords = ["real-world-workflows", "record-update", "data-cleanup", "multi-row-precision"]

[metadata]
author_name = "johnbuck"
difficulty = "hard"
category = "real-world-workflows"
shape = "update-record-with-cleanup"
tags = ["real-world-workflows", "data-cleanup", "harness-discriminating", "multi-axis"]

[verifier]
timeout_sec = 60.0

[agent]
timeout_sec = 600.0

[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"
