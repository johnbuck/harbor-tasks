schema_version = "1.1"

[task]
name = "johnbuck/geometry-polymorphism-refactor"
description = "Refactor a 3-file geometry package: add a Triangle (exported from the package both ways), make total_area polymorphic over any .area() object (remove the isinstance dispatch entirely), handle empty input, and raise on non-shapes — leaving no dead code. Graded completeness+quality rubric: 0.4 visible tests + 0.4 hidden contract edge-cases (package export / empty / raise-on-non-shape / no-isinstance) + 0.2 quality (no test tampering / no debug cruft / no dead imports in main.py). A solution that bolts on another isinstance branch passes some visible tests but scores a clear fraction; the clean refactor scores 1.0."
authors = [{name = "johnbuck"}]
keywords = ["code-editing", "refactor", "multi-file", "python", "pytest", "graded-rubric"]

[metadata]
author_name = "johnbuck"
difficulty = "medium"
category = "code-editing"
shape = "refactor-multi-file"
tags = ["code-editing", "refactor-multi-file", "graded-rubric", "completeness-quality"]

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 420.0

