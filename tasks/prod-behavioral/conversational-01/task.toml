schema_version = "1.3"

[task]
name = "johnbuck/prod-behavioral-conversational-01"
description = "Conversational/behavioral probe for the production-agent eval mode: send one instruction to an EXTERNAL, already-running agent container, capture its response, and grade the captured transcript host-side. There is no /app fixture and no eval backend — the agent runs in its own container (ExternalContainerEnvironment) and is driven via its real entrypoint (ExternalAgentAdapter). The grader scores a single factual recall (the capital of France) off the captured answer; answer_present rides along at weight 0 to distinguish a VOID (no transcript) from a present-but-wrong loss."
authors = [{name = "johnbuck"}]
keywords = ["prod-behavioral", "conversational", "external-container", "graded"]

[metadata]
author_name = "johnbuck"
difficulty = "easy"
category = "prod-behavioral"
shape = "conversational"
tags = ["prod-behavioral", "conversational", "external-container", "production-agent-eval"]
# This task is wired for the production-agent eval mode. The environment, agent,
# and verifier are supplied by import_path in configs/prod-agent-example.yaml (the
# task.toml schema has no verifier.import_path field). It deliberately ships no
# environment/Dockerfile: the environment is an external, already-running
# container, not a built throwaway image.

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0
