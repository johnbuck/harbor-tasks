# First real-LLM trial: openclaw + hermes on one task, same model, via OpenRouter.
# Inject OPENROUTER_API_KEY via the SELF-HOSTED infisical — do NOT put it here.
# NEVER Infisical Cloud. Always: infisical run --domain=http://internal-host:8380
# --projectId=INFISICAL_PROJECT_ID --env=production --path=/proxy/ -- harbor run ...
# (or use the tools/run_*.sh wrappers, which do this correctly via infisical-identity).
#
# Model is Kimi K2.6 (non-Anthropic) on purpose: neither adapter treats
# 'moonshotai' as a native provider, so BOTH fall through to OpenRouter
# automatically — no native-key-preference dance, no env restriction needed.
#
# openclaw gets the openrouter/ prefix (its subclass routes on it);
# hermes gets the bare slug (it splits, sees non-native provider, uses
# OPENROUTER_API_KEY). Same underlying model + endpoint either way.
#
# Both subclasses pin the OpenRouter upstream host to "Io Net" (cheapest
# privacy-guardrail-allowed provider for this model) so caching + price are
# deterministic across runs and across harnesses.

jobs_dir: /tmp/harbor-jobs
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 1
  quiet: false

environment:
  type: docker
  force_build: false
  delete: true
  env:
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

agents:
  - import_path: lib.openclaw_no_install:OpenClawNoInstallOpenRouter
    model_name: openrouter/moonshotai/kimi-k2.6
  - import_path: lib.hermes_no_install:HermesNoInstall
    model_name: moonshotai/kimi-k2.6

datasets:
  - path: tasks/code-editing
