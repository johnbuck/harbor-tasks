# First real-LLM trial: openclaw + hermes on one task, same model.
# Inject ANTHROPIC_API_KEY via `infisical run` — do NOT put it here.
#
# We use anthropic/<model> rather than openrouter/anthropic/<model> because:
#   1. Both adapters support 'anthropic' natively (no subclass workaround)
#   2. Anthropic-direct billing is exact (no OpenRouter markup)
#   3. Same underlying model + API endpoint

jobs_dir: /tmp/harbor-jobs
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 1
  quiet: false

environment:
  type: docker
  force_build: false
  delete: true
  env:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

agents:
  - import_path: lib.openclaw_no_install:OpenClawNoInstallOpenRouter
    model_name: anthropic/claude-sonnet-4-5
  - import_path: lib.hermes_no_install:HermesNoInstall
    model_name: anthropic/claude-sonnet-4-5

datasets:
  - path: /home/trumble/harbor-tasks/tasks/code-editing
