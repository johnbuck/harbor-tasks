# SUITE (alternate-model axis) — a cost-bounded subset of the suite; same harnesses as suite.yaml;
# the only difference is WHICH model both harnesses run. The validity invariant is
# unchanged: BOTH harnesses run the SAME model, so any gap is the HARNESS, not the
# model. The model is a FREE VARIABLE — swap the two model_name values below to any
# model you like (an Anthropic model, Kimi, another OpenRouter model, …) as long as
# they stay identical. This file currently instantiates an Anthropic model so the
# thesis can be re-tested off deepseek.
#
# Routing is general (off the model string, not a hardcoded id):
#   - openclaw model_name is `<provider>/<model>` — `anthropic/*` → direct Anthropic
#     API (ANTHROPIC_API_KEY); `xrouter/*` → the pinned OpenRouter host.
#   - hermes: a Claude model_name → `--provider anthropic` (direct); anything else →
#     baked OpenRouter default. reasoning_effort maps to the provider's native
#     thinking surface — confirm with a 1-call smoke after any model/key change.
#
# ANTHROPIC_API_KEY is scoped to the Harbor Infisical project (env=prod,
# path=/proxy/); run_suite.sh injects it from there alongside the Shared
# OpenRouter key. Run from the repo root:
#   source ~/.config/infisical/agent-architect.env
#   CONFIG=$PWD/configs/suite-claude.yaml N_ATTEMPTS=1 \
#     JOB_NAME=suite-alt-n1 tools/run_suite.sh

job_name: suite-claude

n_attempts: 1

agents:
  - import_path: lib.openclaw_thin:OpenClawThin
    model_name: anthropic/claude-sonnet-4-6
  - import_path: lib.hermes_thin:HermesThin
    model_name: claude-sonnet-4-6

datasets:
  - path: tasks/conversation-persona
    task_names:
      - distinguish-my-facts-from-others
      - persist-facts-through-corrections
      - refresh-config-over-cached-value
  - path: tasks/context-management
    task_names:
      - track-final-state-through-corrections
  - path: tasks/context-rot
    task_names:
      - chain-facts-across-survey-depth
  - path: tasks/ops-debugging
    task_names:
      - adaptive-tool-error-recovery
  - path: tasks/tool-orchestration
    task_names:
      - pick-right-shell-utility
      - redesign-module-keep-constraints
  - path: tasks/skill-agent-authoring
    task_names:
      - parallel-delegation-under-deadline
      - skill-discovery-with-docs
  - path: tasks/real-world-workflows
    task_names:
      - clean-expense-ledger
