# Track B — general-capability sweep (public-facing reporting / smoke).
#
# Spec: backlog/2026-05-30-harness-vs-model-discriminating-suite.md
# - n_attempts=1: single-trial pass@1, no pass^k.
# - Uniform weighting: every task contributes equally to the mean.
# - No memory wipe hook required (general-capability does not need contamination
#   control to the same degree; if running adjacent to Track A, just inherit the
#   same hooked driver).
# - Same model + same adapters as Track A; only the methodology differs.

jobs_dir: /tmp/harbor-jobs
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 3
  quiet: false

environment:
  type: docker
  force_build: false
  delete: true
  env:
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

agents:
  - import_path: lib.openclaw_thin:OpenClawThin
    model_name: xrouter/deepseek/deepseek-v4-pro
  - import_path: lib.hermes_thin:HermesThin
    model_name: deepseek/deepseek-v4-pro

# Same datasets as Track A (uniform weighting comes from MetricType.MEAN default).
datasets:
  - path: tasks/real-world-workflows
  - path: tasks/context-management
  - path: tasks/tool-orchestration
  - path: tasks/skill-agent-authoring
  - path: tasks/conversation-persona
  - path: tasks/research-rag
  - path: tasks/insights-research
  - path: tasks/ops-debugging
  - path: tasks/building-prototypes
  - path: tasks/data-analytics
  - path: tasks/migration
  - path: tasks/backup-dr
  - path: tasks/code-editing
  - path: tasks/marketing
  - path: tasks/documentation
  - path: tasks/code-spec-review
  - path: tasks/test-authoring
  - path: tasks/building-designs
  - path: tasks/compliance-security
