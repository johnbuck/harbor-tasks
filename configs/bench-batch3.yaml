# compilebench + spreadsheetbench + bfcl x openclaw+hermes (install-capable
# adapters + privacy pool). Images already built by bench3-oracle, so
# force_build: false. Run via infisical --path=/proxy/.
jobs_dir: /tmp/harbor-jobs
n_attempts: 1
timeout_multiplier: 1.0
orchestrator:
  type: local
  n_concurrent_trials: 3
  quiet: false
environment:
  type: docker
  force_build: false
  delete: true
  env:
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
agents:
  - import_path: lib.openclaw_openrouter:OpenClawOpenRouter
    model_name: openrouter/moonshotai/kimi-k2.6
  - import_path: lib.hermes_no_install:HermesOpenRouter
    model_name: moonshotai/kimi-k2.6
datasets:
  - path: /tmp/harbor-benchmarks/compilebench
  - path: /tmp/harbor-benchmarks/spreadsheetbench-verified
  - path: /tmp/harbor-benchmarks/bfcl
