# Full first-sweep: openclaw vs hermes across all 17 decided categories.
# Model = Kimi K2.6 via OpenRouter, pinned to "Io Net" in both adapters for
# deterministic caching + price. Inject keys via `infisical run --domain=http://internal-host:8380 --projectId=INFISICAL_PROJECT_ID --env=production --path=/proxy/`
# (OPENROUTER_API_KEY for the agents, ANTHROPIC_API_KEY for the judge verifiers).

jobs_dir: /tmp/harbor-jobs
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 3
  quiet: false

environment:
  type: docker
  force_build: false
  delete: true
  env:
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

agents:
  - import_path: lib.openclaw_thin:OpenClawThin
    model_name: xrouter/deepseek/deepseek-v4-pro
  - import_path: lib.hermes_thin:HermesThin
    model_name: deepseek/deepseek-v4-pro

datasets:
  - path: tasks/code-editing
  - path: tasks/ops-debugging
  - path: tasks/research-rag
  - path: tasks/conversation-persona
  - path: tasks/insights-research
  - path: tasks/data-analytics
  - path: tasks/code-spec-review
  - path: tasks/test-authoring
  - path: tasks/tool-orchestration
  - path: tasks/skill-agent-authoring
  - path: tasks/migration
  - path: tasks/compliance-security
