# Oracle validation for the 3 redesigned context-management saturation tasks.
# Runs solution/solve.sh (no LLM) through the full Docker build + multi-step
# plumbing + verifier reward-schema layer (the thing FOOTGUNS #38 says local
# eyeballing misses). Expect all 3 -> reward 1.0.

jobs_dir: /home/trumble/harbor-tasks/jobs
job_name: validate-ctx
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 3
  quiet: false

environment:
  type: docker
  force_build: true
  delete: true

agents:
  - name: oracle

datasets:
  - path: /home/trumble/harbor-tasks/tasks/context-management
    task_names:
      - multistep-context-fill-01
      - multistep-context-fill-02
      - multistep-context-fill-03
