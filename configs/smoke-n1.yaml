# Full-suite n=1 e2e smoke — REAL harness agents (thin adapters, deepseek-v4-pro,
# same model both harnesses) across every active eval task. Confirms each task
# runs end-to-end with a real agent and that graders behave live (a real run, not
# the oracle perfect solution). Precondition for approved=true. Run on the run
# host via the driver (handles secrets + wipe/seed hooks); see AGENTS.md "Running
# a sweep":
#   CONFIG=$PWD/configs/smoke-n1.yaml N_ATTEMPTS=1 JOB_NAME=smoke-n1 tools/run_track_a.sh
job_name: smoke-n1
n_attempts: 1
agents:
  - import_path: lib.openclaw_thin:OpenClawThin
    model_name: xrouter/deepseek/deepseek-v4-pro
  - import_path: lib.hermes_thin:HermesThin
    model_name: deepseek/deepseek-v4-pro
datasets:
  - path: tasks/code-editing
    task_names:
      - geometry-polymorphism-refactor
  - path: tasks/code-spec-review
    task_names:
      - security-code-review
  - path: tasks/compliance-security
    task_names:
      - credential-leak-detection
  - path: tasks/context-management
    task_names:
      - track-project-across-context-overflow
      - track-final-state-through-corrections
      - separate-two-parallel-projects
  - path: tasks/context-rot
    task_names:
      - retain-details-across-long-survey
      - chain-facts-across-survey-depth
  - path: tasks/conversation-persona
    task_names:
      - distinguish-my-facts-from-others
      - recall-details-across-task-switching
      - recall-details-under-high-load
      - apply-standing-preferences-unprompted
      - refresh-config-over-cached-value
      - persist-facts-through-corrections
  - path: tasks/data-analytics
    task_names:
      - analyze-sales-data
  - path: tasks/insights-research
    task_names:
      - audit-report-contradictions
  - path: tasks/migration
    task_names:
      - pydantic-v2-migration
  - path: tasks/ops-debugging
    task_names:
      - http-outage-root-cause-from-logs
      - adaptive-tool-error-recovery
      - log-analytics-with-tie-breaks
  - path: tasks/real-world-workflows
    task_names:
      - summarize-support-emails-safely
      - book-meeting-with-contact
      - clean-expense-ledger
  - path: tasks/research-rag
    task_names:
      - research-org-profile-cited
      - verify-company-facts-cited
  - path: tasks/skill-agent-authoring
    task_names:
      - skill-discovery-with-docs
      - parallel-delegation-under-deadline
  - path: tasks/test-authoring
    task_names:
      - comprehensive-unit-tests
  - path: tasks/tool-orchestration
    task_names:
      - web-research-multi-page
      - redesign-module-keep-constraints
      - multi-goal-tool-routing
      - pick-right-shell-utility
