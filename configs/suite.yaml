# SUITE — the full harness-vs-model eval suite (unified 2026-06-25).
#
# All 33 active eval tasks (tasks/**/task.toml minus the 2 _verify fixtures).
# There is NO privileged subset: ONE suite under ONE validation bar. Whether a
# given task discriminates the harness is an OUTCOME measured per-task at n>=3,
# not a pre-assigned tier. See backlog/2026-06-25-unify-full-suite.md.
#
# Same model both harnesses (deepseek-v4-pro, reasoning ON) => any gap is the
# HARNESS, not the model.
#
# Run n=1 FIRST to confirm plumbing + that graders behave live, before paying 5x
# for the pass^k reliability grid:
#   CONFIG=$PWD/configs/suite.yaml N_ATTEMPTS=1 JOB_NAME=suite-n1 tools/run_suite.sh
# Then the verdict-bearing reliability grid at n=5:
#   CONFIG=$PWD/configs/suite.yaml N_ATTEMPTS=5 JOB_NAME=suite-n5 tools/run_suite.sh

job_name: suite

n_attempts: 1

agents:
  - import_path: lib.openclaw_thin:OpenClawThin
    model_name: xrouter/deepseek/deepseek-v4-pro
  - import_path: lib.hermes_thin:HermesThin
    model_name: deepseek/deepseek-v4-pro

datasets:
  - path: tasks/code-editing
    task_names:
      - geometry-polymorphism-refactor
  - path: tasks/code-spec-review
    task_names:
      - security-code-review
  - path: tasks/compliance-security
    task_names:
      - credential-leak-detection
  - path: tasks/context-management
    task_names:
      - track-project-across-context-overflow
      - track-final-state-through-corrections   # chunks deleted pre-recall (cheat-proof), graded /12
      - separate-two-parallel-projects
  - path: tasks/context-rot
    task_names:
      - retain-details-across-long-survey
      - chain-facts-across-survey-depth
  - path: tasks/conversation-persona
    task_names:
      - distinguish-my-facts-from-others
      - recall-details-across-task-switching
      - recall-details-under-high-load
      - apply-standing-preferences-unprompted
      - refresh-config-over-cached-value
      - persist-facts-through-corrections
  - path: tasks/data-analytics
    task_names:
      - analyze-sales-data
  - path: tasks/insights-research
    task_names:
      - audit-report-contradictions
  - path: tasks/migration
    task_names:
      - pydantic-v2-migration
  - path: tasks/ops-debugging
    task_names:
      - http-outage-root-cause-from-logs
      - adaptive-tool-error-recovery
      - log-analytics-with-tie-breaks
  # prod-behavioral/basic-knowledge-qa is EXCLUDED from this sweep — it's a
  # DIFFERENT eval mode (ExternalAgentAdapter via configs/prod-agent-example.yaml,
  # ships no Dockerfile/test.sh), so it cannot build under this docker suite config.
  - path: tasks/real-world-workflows
    task_names:
      - summarize-support-emails-safely
      - book-meeting-with-contact
      - clean-expense-ledger         # ledger dedup + preservation traps, leak-proof, /16
  - path: tasks/research-rag
    task_names:
      - research-org-profile-cited
      - verify-company-facts-cited
  - path: tasks/skill-agent-authoring
    task_names:
      - skill-discovery-with-docs
      - parallel-delegation-under-deadline
  - path: tasks/test-authoring
    task_names:
      - comprehensive-unit-tests
  - path: tasks/tool-orchestration
    task_names:
      - web-research-multi-page
      - redesign-module-keep-constraints                   # mid-task replanning; clamp-memory 0.40 + functional 0.40 + cleanup 0.12 + replan-keyword 0.08
      - multi-goal-tool-routing
      - pick-right-shell-utility
