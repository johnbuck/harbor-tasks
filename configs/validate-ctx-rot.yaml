# Oracle validation for the context-rot scoring fix (#93). Runs solution/solve.sh
# (no LLM) through the full Docker build + multi-step plumbing + verifier
# reward-schema layer — proves the new grader end-to-end:
#   * reward.json carries ONLY the 5 normalized keys (reward, correctness,
#     early, middle, late) — no chains/facts/answer_chars blending
#   * reward-details.json sibling is written (raw counts + answer audit)
#   * oracle -> reward 1.0, early/middle/late 1.0
# Expect both tasks -> reward 1.0.

jobs_dir: /home/trumble/harbor-tasks/jobs
job_name: validate-ctx-rot
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 2
  quiet: false

environment:
  type: docker
  force_build: true
  delete: true

agents:
  - name: oracle

datasets:
  - path: /home/trumble/harbor-tasks/tasks/context-rot
    task_names:
      - context-rot-01
      - context-rot-02
