# Focused discrimination set: the 13 sharpened high-weight tasks + the 2 already
# -proven discriminators (failure-recovery, memory-conversational-02). Run n=1
# first to confirm each separates the harnesses (and catch any broken task),
# then n=5 (via N_ATTEMPTS=5) on the confirmed set for pass^k reliability.
# Skips the 30+ saturated BLUNT controls — no point paying 5x for ties.
job_name: track-a-focused

n_attempts: 1

agents:
  - import_path: lib.openclaw_thin:OpenClawThin
    model_name: xrouter/deepseek/deepseek-v4-pro
  - import_path: lib.hermes_thin:HermesThin
    model_name: deepseek/deepseek-v4-pro

datasets:
  - path: tasks/context-management
    task_names:
      - track-project-across-context-overflow
      - track-final-state-through-corrections
      - separate-two-parallel-projects
  - path: tasks/conversation-persona
    task_names:
      - distinguish-my-facts-from-others
      - recall-details-across-task-switching
      - recall-details-under-high-load
  - path: tasks/tool-orchestration
    task_names:
      - pick-right-shell-utility
      - redesign-module-keep-constraints
  - path: tasks/skill-agent-authoring
    task_names:
      - parallel-delegation-under-deadline
      - skill-discovery-with-docs
  - path: tasks/real-world-workflows
    task_names:
      - book-meeting-with-contact
      - clean-expense-ledger
      - summarize-support-emails-safely
  - path: tasks/insights-research
    task_names:
      - audit-report-contradictions
  - path: tasks/research-rag
    task_names:
      - verify-company-facts-cited
  - path: tasks/ops-debugging
    task_names:
      - adaptive-tool-error-recovery
