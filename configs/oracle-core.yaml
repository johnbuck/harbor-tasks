# Free oracle validation of the reworked core eleven (2026-06-10 remediation).
# The built-in `oracle` agent runs each task's solution/solve.sh (no LLM cost);
# objective tasks should score ~1.0. force_build=true so the reworked Dockerfiles
# / graders are rebuilt. None of the core eleven use an LLM-judge verifier, so no
# real API key is needed (placeholder below). Run ON the run host:
#   <repo>/../harbor/.venv/bin/harbor run -c configs/oracle-core.yaml
job_name: oracle-core

jobs_dir: jobs
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 3
  quiet: false

environment:
  type: docker
  force_build: true
  delete: true
  env:
    - OPENROUTER_API_KEY=oracle-noop-not-a-real-key

agents:
  - name: oracle

datasets:
  - path: tasks/conversation-persona
    task_names:
      - distinguish-my-facts-from-others
      - persist-facts-through-corrections
      - refresh-config-over-cached-value
  - path: tasks/context-management
    task_names:
      - track-final-state-through-corrections
  - path: tasks/context-rot
    task_names:
      - chain-facts-across-survey-depth
  - path: tasks/ops-debugging
    task_names:
      - adaptive-tool-error-recovery
  - path: tasks/tool-orchestration
    task_names:
      - pick-right-shell-utility
      - redesign-module-keep-constraints
  - path: tasks/skill-agent-authoring
    task_names:
      - parallel-delegation-under-deadline
      - skill-discovery-with-docs
  - path: tasks/real-world-workflows
    task_names:
      - clean-expense-ledger
