# Track A — per-category weights for the harness-vs-model discriminating sweep.
#
# Spec: backlog/2026-05-30-harness-vs-model-discriminating-suite.md
# Consumed by: metrics/track_a_weighted.py
#
# Weights are operator-judgment initial values. After the first Track A sweep
# produces real data, refit from observed score variance (down-weight categories
# that produced no harness split, up-weight ones that did).
