# Free task validation via the built-in oracle agent (runs solution/solve.sh,
# no LLM agent cost). For judge tasks the VERIFIER still calls Anthropic, so
# run this through `infisical run --domain=http://internal-host:8380 --projectId=INFISICAL_PROJECT_ID --env=production --path=/proxy/` to inject ANTHROPIC_API_KEY.
# Point `datasets[].path` at whichever category dir you're validating.

jobs_dir: /tmp/harbor-jobs
n_attempts: 1
timeout_multiplier: 1.0

orchestrator:
  type: local
  n_concurrent_trials: 2
  quiet: false

environment:
  type: docker
  force_build: false
  delete: true
  env:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

agents:
  - name: oracle

datasets:
  - path: tasks/marketing
