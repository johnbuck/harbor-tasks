# Pinkleberry memory stack — wiley (~/Docker/recall/docker-compose.yml)
# =============================================================================
# SOURCE-OF-TRUTH MIRROR. The canonical file is on wiley at
# ~/Docker/recall/docker-compose.yml. This repo copy is for version tracking /
# review. Deploy by copying to wiley, then `docker compose up -d <service>`.
#
# Contains THREE memory products on the shared external `pinkleberry_bridge`:
#   - recall    (Graphiti temporal-KG MCP)  — PRE-EXISTING, copied verbatim.
#   - hindsight (vectorize-io learning memory MCP) — ADDED for agent eval.
#   - honcho    (plastic-labs ambient memory, built from source) — ADDED.
#
# Per the operator: all memory services live in this one wiley stack; recall is
# NOT relocated. New services were appended; recall's three services are
# untouched. Eval agents (openclaw/hermes) reach hindsight at :8888 and honcho
# at :8000 over the LAN; intra-stack LLM/embeddings calls go via docker DNS.
#
# Memory-derivation LLM = OpenRouter (deepseek-v4-flash). The OpenRouter key is
# the EXISTING ${OPENAI_API_KEY} in .env (recall already routes through
# OPENAI_BASE_URL=https://openrouter.ai/api/v1). No-train guarantee is enforced
# at the OpenRouter ACCOUNT level (these plain-OpenAI clients can't send the
# per-request data_collection:deny body param the agent adapters use).
# Embeddings: shared `mem-embed` (BAAI/bge-m3, dim 1024, 8192-token) serves
# honcho + hindsight. recall stays on bge-small/384 until its separate re-embed
# migration (Graphiti has no in-place re-embed; prod juliet/yui graph).
#
# New .env keys (hand-managed on wiley, generated without echoing to stdout):
#   HINDSIGHT_DB_PASSWORD, HONCHO_DB_PASSWORD
# =============================================================================

services:
  # ------------------------------------------------------------------ recall
  recall-neo4j:
    image: neo4j:5-community
    container_name: recall-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${RECALL_NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1G
      - NEO4J_server_memory_pagecache_size=512m
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - /mnt/crumbleton/docker/recall/neo4j-data:/data
      - /mnt/crumbleton/docker/recall/neo4j-logs:/logs
      - /mnt/crumbleton/docker/recall/neo4j-import:/var/lib/neo4j/import
    ports:
      - "7688:7687"
      - "7475:7474"
    networks:
      - pinkleberry_bridge
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  recall-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: recall-embed
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-small-en-v1.5"]
    volumes:
      - /mnt/crumbleton/docker/recall/embed-cache:/data
    networks:
      - pinkleberry_bridge

  recall-mcp:
    build: .
    # PROD pin — promoted to P4 (+ mental_model + refresher cron)
    # 2026-05-30. Rollback targets: recall-mcp:pre-hindsight-parity,
    # :p1, :p2, :p3. See backlog/2026-05-29-recall-hindsight-style-plugin.md D14.
    image: recall-mcp:p4
    container_name: recall-mcp
    restart: unless-stopped
    depends_on:
      recall-neo4j:
        condition: service_healthy
      recall-embed:
        condition: service_started
    environment:
      - NEO4J_URI=bolt://recall-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${RECALL_NEO4J_PASSWORD}
      - NEO4J_DATABASE=neo4j
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=https://api.z.ai/api/anthropic
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - GRAPHITI_GROUP_ID=juliet
      - SEMAPHORE_LIMIT=10
      - CONFIG_PATH=/app/mcp/config/config.yaml
      - BROWSER=0
      # P2 — enable the reflect tool (kill switch default is false).
      - RECALL_REFLECT_ENABLED=true
      # P3 — enable bank_config + directive + retain_mission injection
      - RECALL_BANK_CONFIG_ENABLED=true
      - RECALL_DIRECTIVE_ENABLED=true
      - RECALL_RETAIN_MISSION_ENABLED=true
      # P4 — enable mental_model tools
      - RECALL_MENTAL_MODEL_ENABLED=true
    volumes:
      - ./config.yaml:/app/mcp/config/config.yaml:ro
    ports:
      - "8407:8000"
    networks:
      - pinkleberry_bridge

  # Eval-side recall — same image + same neo4j, distinct ENTITY ONTOLOGY tuned
  # for the harbor-tasks eval domain (Bug/TestCase/API/Dependency/File/Concept/
  # Constraint/Source). Group-id isolation via X-Group-ID header (eval-openclaw
  # / eval-hermes) keeps eval writes off prod (juliet/yui/akane) graphs.
  # Shares mem-embed (bge-m3) and the same OpenRouter deepseek-v4-flash extractor.
  recall-mcp-eval:
    # EVAL canary — tracks the latest hindsight-style-plugin phase
    # (currently P4: + mental_model tools + refresher cron).
    image: recall-mcp:p4
    container_name: recall-mcp-eval
    restart: unless-stopped
    depends_on:
      recall-neo4j:
        condition: service_healthy
      mem-embed:
        condition: service_started
    environment:
      - NEO4J_URI=bolt://recall-neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${RECALL_NEO4J_PASSWORD}
      - NEO4J_DATABASE=neo4j
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=https://openrouter.ai/api/v1
      - GRAPHITI_GROUP_ID=eval-default
      - SEMAPHORE_LIMIT=10
      - CONFIG_PATH=/app/mcp/config/config.yaml
      - BROWSER=0
      # P2 — enable the reflect tool (kill switch default is false).
      - RECALL_REFLECT_ENABLED=true
      # P3 — enable bank_config + directive + retain_mission injection
      - RECALL_BANK_CONFIG_ENABLED=true
      - RECALL_DIRECTIVE_ENABLED=true
      - RECALL_RETAIN_MISSION_ENABLED=true
      # P4 — enable mental_model tools
      - RECALL_MENTAL_MODEL_ENABLED=true
    volumes:
      - ./config.eval.yaml:/app/mcp/config/config.yaml:ro
    ports:
      - "8408:8000"
    networks:
      - pinkleberry_bridge
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # --------------------------------------------------------------- mem-embed
  # Shared memory embedder: bge-m3 (1024-dim, 8192-token) via HF TEI. Serves
  # honcho + hindsight now; recall migrates onto it (separate re-embed step).
  # OpenAI-compatible at /v1/embeddings AND native TEI at /embed.
  mem-embed:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.9
    container_name: mem-embed
    restart: unless-stopped
    command: ["--model-id", "BAAI/bge-m3", "--auto-truncate"]
    volumes:
      - /mnt/crumbleton/docker/mem-embed/cache:/data
    networks:
      - pinkleberry_bridge
    # NOTE: no healthcheck — the TEI image ships no wget/curl/nc and a distroless
    # base, so an in-container HTTP probe can't run. Dependents use
    # `service_started`; TEI loads fast once the model is cached in the volume.

  # --------------------------------------------------------------- hindsight
  # vectorize-io learning memory. MCP (streamable-HTTP) at :8888/mcp/<bank>/.
  # Per-agent isolation via bank id (eval-openclaw / eval-hermes).
  hindsight-db:
    image: pgvector/pgvector:pg18
    container_name: hindsight-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=hindsight_user
      - POSTGRES_PASSWORD=${HINDSIGHT_DB_PASSWORD}
      - POSTGRES_DB=hindsight_db
    volumes:
      # postgres:18 keeps data under /var/lib/postgresql/18/docker
      - /mnt/crumbleton/docker/hindsight/pgdata:/var/lib/postgresql/18/docker
    networks:
      - pinkleberry_bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hindsight_user -d hindsight_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest
    container_name: hindsight-app
    restart: unless-stopped
    depends_on:
      hindsight-db:
        condition: service_healthy
      mem-embed:
        condition: service_started
    environment:
      - HINDSIGHT_API_LLM_PROVIDER=openai
      - HINDSIGHT_API_LLM_API_KEY=${OPENAI_API_KEY}
      - HINDSIGHT_API_LLM_BASE_URL=https://openrouter.ai/api/v1
      - HINDSIGHT_API_LLM_MODEL=deepseek/deepseek-v4-flash
      - HINDSIGHT_API_DATABASE_URL=postgresql://hindsight_user:${HINDSIGHT_DB_PASSWORD}@hindsight-db:5432/hindsight_db
      - HINDSIGHT_API_HOST=0.0.0.0
      - HINDSIGHT_API_PORT=8888
      # Embeddings → shared bge-m3 TEI (1024-dim) instead of the bundled local model.
      - HINDSIGHT_API_EMBEDDINGS_PROVIDER=tei
      - HINDSIGHT_API_EMBEDDINGS_TEI_URL=http://mem-embed:80
      - HINDSIGHT_API_EMBEDDINGS_TEI_MODEL=BAAI/bge-m3
    ports:
      - "8888:8888"   # API + MCP
      - "9999:9999"   # UI
    networks:
      - pinkleberry_bridge

  # ------------------------------------------------------------------ honcho
  # plastic-labs ambient memory, BUILT FROM SOURCE (no prebuilt image).
  # Clone on wiley: git clone https://github.com/plastic-labs/honcho honcho-src
  # hermes integrates via the API base URL (http://wiley-pinkleberry.lan:8000).
  honcho-postgres:
    image: pgvector/pgvector:pg15
    container_name: honcho-postgres
    restart: unless-stopped
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${HONCHO_DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - ./honcho-src/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - /mnt/crumbleton/docker/honcho/pgdata:/var/lib/postgresql/data
    networks:
      - pinkleberry_bridge
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  honcho-redis:
    image: redis:8.2
    container_name: honcho-redis
    restart: unless-stopped
    volumes:
      - /mnt/crumbleton/docker/honcho/redis:/data
    networks:
      - pinkleberry_bridge
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  honcho-api:
    build:
      context: ./honcho-src
      dockerfile: Dockerfile
    image: honcho:local
    container_name: honcho-api
    restart: unless-stopped
    entrypoint: ["sh", "docker/entrypoint.sh"]
    depends_on:
      honcho-postgres:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
      mem-embed:
        condition: service_started
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${HONCHO_DB_PASSWORD}@honcho-postgres:5432/postgres
      - CACHE_URL=redis://honcho-redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - AUTH_USE_AUTH=false
      - LLM_OPENAI_API_KEY=${OPENAI_API_KEY}
      # Memory-derivation LLM → OpenRouter deepseek-v4-flash (all modules).
      - DERIVER_MODEL_CONFIG__TRANSPORT=openai
      - DERIVER_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - SUMMARY_MODEL_CONFIG__TRANSPORT=openai
      - SUMMARY_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT=openai
      - DREAM_DEDUCTION_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT=openai
      - DREAM_INDUCTION_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DIALECTIC_LEVELS__minimal__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__minimal__MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DIALECTIC_LEVELS__minimal__MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DIALECTIC_LEVELS__low__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__low__MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DIALECTIC_LEVELS__low__MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DIALECTIC_LEVELS__medium__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__medium__MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DIALECTIC_LEVELS__medium__MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DIALECTIC_LEVELS__high__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__high__MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DIALECTIC_LEVELS__high__MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DIALECTIC_LEVELS__max__MODEL_CONFIG__TRANSPORT=openai
      - DIALECTIC_LEVELS__max__MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DIALECTIC_LEVELS__max__MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      # Embeddings → reuse recall-embed (TEI, OpenAI-compatible, dim 384).
      - EMBED_MESSAGES=true
      - EMBEDDING_VECTOR_DIMENSIONS=1024
      - EMBEDDING_MAX_INPUT_TOKENS=8192
      - EMBEDDING_MODEL_CONFIG__TRANSPORT=openai
      - EMBEDDING_MODEL_CONFIG__MODEL=BAAI/bge-m3
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL=http://mem-embed/v1
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__API_KEY_ENV=HONCHO_EMBED_DUMMY_KEY
      - HONCHO_EMBED_DUMMY_KEY=not-needed-for-tei
      - VECTOR_STORE_TYPE=pgvector
    ports:
      - "8000:8000"
    networks:
      - pinkleberry_bridge

  honcho-deriver:
    build:
      context: ./honcho-src
      dockerfile: Dockerfile
    image: honcho:local
    container_name: honcho-deriver
    restart: unless-stopped
    entrypoint: ["/app/.venv/bin/python", "-m", "src.deriver"]
    depends_on:
      honcho-api:
        condition: service_started
      honcho-postgres:
        condition: service_healthy
      honcho-redis:
        condition: service_healthy
      mem-embed:
        condition: service_started
    environment:
      - DB_CONNECTION_URI=postgresql+psycopg://postgres:${HONCHO_DB_PASSWORD}@honcho-postgres:5432/postgres
      - CACHE_URL=redis://honcho-redis:6379/0?suppress=true
      - CACHE_ENABLED=true
      - AUTH_USE_AUTH=false
      - LLM_OPENAI_API_KEY=${OPENAI_API_KEY}
      - DERIVER_MODEL_CONFIG__TRANSPORT=openai
      - DERIVER_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DERIVER_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - SUMMARY_MODEL_CONFIG__TRANSPORT=openai
      - SUMMARY_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - SUMMARY_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DREAM_DEDUCTION_MODEL_CONFIG__TRANSPORT=openai
      - DREAM_DEDUCTION_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DREAM_DEDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - DREAM_INDUCTION_MODEL_CONFIG__TRANSPORT=openai
      - DREAM_INDUCTION_MODEL_CONFIG__MODEL=deepseek/deepseek-v4-flash
      - DREAM_INDUCTION_MODEL_CONFIG__OVERRIDES__BASE_URL=https://openrouter.ai/api/v1
      - EMBED_MESSAGES=true
      - EMBEDDING_VECTOR_DIMENSIONS=1024
      - EMBEDDING_MAX_INPUT_TOKENS=8192
      - EMBEDDING_MODEL_CONFIG__TRANSPORT=openai
      - EMBEDDING_MODEL_CONFIG__MODEL=BAAI/bge-m3
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__BASE_URL=http://mem-embed/v1
      - EMBEDDING_MODEL_CONFIG__OVERRIDES__API_KEY_ENV=HONCHO_EMBED_DUMMY_KEY
      - HONCHO_EMBED_DUMMY_KEY=not-needed-for-tei
      - VECTOR_STORE_TYPE=pgvector
    networks:
      - pinkleberry_bridge

networks:
  pinkleberry_bridge:
    external: true
