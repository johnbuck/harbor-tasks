schema_version = "1.1"
multi_step_reward_strategy = "final"

[task]
name = "johnbuck/multistep-scaffold-implement-document-02"
description = "Three-step build: scaffold a three-function `textkit` package (slugify/truncate/word_count), implement it (truncate is suffix-aware: returned length is at most n INCLUDING the suffix), then write a README that MATCHES the implementation. GRADED final step: 12 independent sub-checks — files present, agent pytest suite (>=5 tests) passing, slugify (incl empty), suffix-aware truncate long+short cases, whitespace word_count (incl empty), no debug cruft, README documents all three functions + the suffix-aware length rule, and a runnable usage example whose inline '# expected' comments must equal real stdout. Difficulty/doc-matching wrinkle: the naive `s[:n]+suffix` truncate over-runs the length budget, and an under-documented README is graded against what was actually built."
authors = [{name = "johnbuck"}]
keywords = ["building-prototypes", "scaffold", "python", "multi-step"]

[metadata]
status = "deprecated"
deprecation_date = "2026-06-01"
deprecation_reason = "Same shell, toy textkit lib; model-dominated one-shot; saturates 1.0."
deprecation_doc = "backlog/2026-06-01-adversarial-review.md"
author_name = "johnbuck"
difficulty = "hard"
category = "building-prototypes"
shape = "multistep-scaffold-implement-document"
tags = ["building-prototypes", "multi-step", "harness-discriminating"]


[environment]
build_timeout_sec = 600.0
workdir = "/app"
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[agent]
timeout_sec = 300.0

[verifier]
timeout_sec = 60.0

[[steps]]
name = "01-scaffold"
min_reward = 1.0
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "02-implement"
[steps.agent]
timeout_sec = 120.0
[steps.verifier]
timeout_sec = 30.0

[[steps]]
name = "03-document"
[steps.agent]
timeout_sec = 180.0
[steps.verifier]
timeout_sec = 60.0
