description = "Fix an interval merger to satisfy a full contract (overlap+touching+containment merge, input not mutated, ValueError on start>end), not just the visible pytest. Graded completeness+quality rubric: 0.4 visible tests + 0.4 hidden contract edge-cases + 0.2 quality (no test tampering / signature intact / no debug cruft). A naive `<`->`<=` fix passes the visible tests but fails the no-mutation and ValueError-validation cases and scores a clear fraction; the full contract scores 1.0."
