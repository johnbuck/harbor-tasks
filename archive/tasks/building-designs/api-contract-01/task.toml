schema_version = "1.1"

# Separate verifier sandbox: grades only the declared artifact (the agent's
# openapi.yaml), in its own container, with the rewardkit grader baked in
# (tests/Dockerfile). No grader source or answer key in the agent's reach.
artifacts = ["/app/openapi.yaml"]

[task]
name = "johnbuck/api-contract-01"
description = "Author an OpenAPI 3 contract for a Todo API (CRUD + 400/404 error responses, Error schema, create-input schema that omits server-assigned id); graded deterministically per endpoint/status-code/schema-rule (N=16)."
authors = [{name = "johnbuck"}]
keywords = ["building-designs", "api-contract", "openapi", "graded"]

[metadata]
status = "deprecated"
deprecation_date = "2026-06-01"
deprecation_reason = "Model spec-filling: 16 OpenAPI criteria enumerated in prompt; saturates 1.0 for both."
deprecation_doc = "backlog/2026-06-01-adversarial-review.md"
author_name = "johnbuck"
difficulty = "medium"
category = "building-designs"
shape = "api-contract"
tags = ["building-designs", "api-contract", "graded", "deterministic"]

[verifier]
timeout_sec = 300.0
environment_mode = "separate"

# Built from tests/Dockerfile (bakes rewardkit + pyyaml); grading needs no network.
[verifier.environment]
allow_internet = false

[agent]
timeout_sec = 300.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = true
mcp_servers = []

[verifier.env]

[environment.env]
OPENROUTER_API_KEY = "${OPENROUTER_API_KEY}"

[solution.env]
